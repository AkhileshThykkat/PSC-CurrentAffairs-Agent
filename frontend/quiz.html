<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quiz - PSC Current Affairs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-white text-slate-800">
    <header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="/" class="text-xl font-bold text-green-700">PSC Current Affairs</a>
                <nav class="flex gap-4 text-sm">
                    <a href="/" class="text-slate-600 hover:text-green-700">Today</a>
                    <a href="/quiz" class="text-green-700 font-medium">Quiz</a>
                    <a href="/archive" class="text-slate-600 hover:text-green-700">Archive</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div id="loading" class="text-center py-12">
            <div class="inline-block w-8 h-8 border-4 border-green-700 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-500 mt-4">Loading quiz...</p>
        </div>

        <div id="no-quiz" class="hidden text-center py-12">
            <p class="text-slate-500 text-lg">No quiz available for today yet.</p>
            <p class="text-slate-400 text-sm mt-2">Quizzes are generated daily at 6:00 AM.</p>
        </div>

        <div id="quiz-container" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-2xl font-bold">Daily Quiz</h1>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-slate-500" id="quiz-date"></span>
                    <button id="regenerate-btn" class="text-xs bg-green-700 text-white px-3 py-1.5 rounded-lg font-medium hover:bg-green-800 transition-colors">Regenerate</button>
                </div>
            </div>

            <div class="w-full bg-slate-200 rounded-full h-2 mb-6">
                <div id="progress-bar" class="bg-green-700 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>

            <div id="question-card" class="bg-slate-50 rounded-xl p-6 shadow-sm">
                <p class="text-sm text-slate-500 mb-2" id="question-number"></p>
                <h2 class="text-lg font-semibold mb-6" id="question-text"></h2>
                <div id="options-container" class="space-y-3"></div>
            </div>

            <div id="answer-reveal" class="hidden mt-6 bg-green-50 border border-green-200 rounded-xl p-6">
                <p class="font-medium text-green-800 mb-2" id="correct-answer-text"></p>
                <p class="text-sm text-green-700" id="explanation-text"></p>
            </div>

            <div class="flex gap-4 mt-6">
                <button id="submit-btn" class="flex-1 bg-green-700 text-white py-3 rounded-lg font-medium hover:bg-green-800 transition-colors" disabled>Submit Answer</button>
                <button id="next-btn" class="hidden flex-1 bg-slate-800 text-white py-3 rounded-lg font-medium hover:bg-slate-900 transition-colors">Next Question</button>
            </div>
        </div>

        <div id="score-card" class="hidden text-center py-8">
            <div class="bg-green-50 border border-green-200 rounded-xl p-8">
                <h2 class="text-3xl font-bold text-green-800 mb-2">Quiz Complete!</h2>
                <p class="text-5xl font-bold text-green-700 my-4" id="score-text"></p>
                <p class="text-slate-600" id="score-message"></p>
                <button id="take-another-btn" class="mt-6 bg-green-700 text-white px-6 py-3 rounded-lg font-medium hover:bg-green-800 transition-colors">Take Another Quiz</button>
            </div>
        </div>
    </main>

    <script src="/static/js/quiz.js"></script>
</body>
</html>
