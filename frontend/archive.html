<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive - PSC Current Affairs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-white text-slate-800">
    <header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="/" class="text-xl font-bold text-green-700">PSC Current Affairs</a>
                <nav class="flex gap-4 text-sm">
                    <a href="/" class="text-slate-600 hover:text-green-700">Today</a>
                    <a href="/quiz" class="text-slate-600 hover:text-green-700">Quiz</a>
                    <a href="/archive" class="text-green-700 font-medium">Archive</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex flex-col sm:flex-row gap-4 mb-6">
            <div class="flex gap-2 flex-wrap" id="range-buttons">
                <button data-days="1" class="range-btn active px-4 py-2 rounded-lg text-sm font-medium bg-green-700 text-white">Today</button>
                <button data-days="7" class="range-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-700 hover:bg-slate-200">7 Days</button>
                <button data-days="30" class="range-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-700 hover:bg-slate-200">30 Days</button>
                <button data-days="365" class="range-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-700 hover:bg-slate-200">1 Year</button>
            </div>
            <div class="flex gap-2 ml-auto">
                <select id="category-filter" class="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
                    <option value="">All Categories</option>
                    <option value="Kerala">Kerala</option>
                    <option value="India">India</option>
                    <option value="International">International</option>
                </select>
                <select id="importance-filter" class="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
                    <option value="">All Importance</option>
                    <option value="HIGH">HIGH</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="LOW">LOW</option>
                </select>
            </div>
        </div>

        <div id="loading" class="skeleton-grid">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>
        <div id="articles-grid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <p id="no-articles" class="hidden text-center text-slate-500 py-12">No articles found for this filter.</p>
    </main>

    <script src="/static/js/archive.js"></script>
</body>
</html>
